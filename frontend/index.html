<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente UV - Chile</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .status-online {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .status-offline {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .status-loading {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }

        .status-local {
            background: rgba(52, 152, 219, 0.2);
            color: #3498db;
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .indicator.online { background: #2ecc71; }
        .indicator.offline { background: #e74c3c; }
        .indicator.loading { background: #f1c40f; }
        .indicator.local { background: #3498db; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refresh-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 auto;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(52, 152, 219, 0.4);
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .city-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .city-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .city-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .city-name {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .city-source {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }

        .uv-section {
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .uv-bajo { background: linear-gradient(135deg, #4CAF50, #2E7D32); }
        .uv-moderado { background: linear-gradient(135deg, #FFEB3B, #F9A825); color: #333; }
        .uv-alto { background: linear-gradient(135deg, #FF9800, #E65100); }
        .uv-muy-alto { background: linear-gradient(135deg, #F44336, #C62828); }
        .uv-extremo { background: linear-gradient(135deg, #9C27B0, #6A1B9A); }

        .uv-value {
            font-size: 2.5rem;
            font-weight: bold;
        }

        .uv-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .weather-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .weather-item {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .weather-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .weather-label {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .alert-badge {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 10px;
            text-align: center;
        }

        .error-message {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            margin: 50px auto;
        }

        .error-message h3 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .loading-container {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .recommendations {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .recommendations-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #f39c12;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .mode-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .mode-btn.active {
            background: #3498db;
            border-color: #3498db;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const CIUDADES = {
            "Iquique": { lat: -20.2133, lon: -70.1503 },
            "Chañaral": { lat: -26.3444, lon: -70.6197 },
            "Coquimbo": { lat: -29.9533, lon: -71.3375 },
            "Maipú": { lat: -33.5097, lon: -70.7633 },
            "Santiago": { lat: -33.4489, lon: -70.6693 },
            "Talcahuano": { lat: -36.7249, lon: -73.1167 },
            "Puerto Montt": { lat: -41.4693, lon: -72.9426 },
            "Aysén": { lat: -45.4081, lon: -72.3272 },
        };

        const CATEGORIAS_UV = [
            { min: 0, max: 2.99, nivel: "Bajo", class: "uv-bajo" },
            { min: 3, max: 5.99, nivel: "Moderado", class: "uv-moderado" },
            { min: 6, max: 7.99, nivel: "Alto", class: "uv-alto" },
            { min: 8, max: 10.99, nivel: "Muy Alto", class: "uv-muy-alto" },
            { min: 11, max: 99, nivel: "Extremo", class: "uv-extremo" },
        ];

        const RECOMENDACIONES = {
            "Bajo": "Protección mínima requerida. Use gafas de sol en días brillantes.",
            "Moderado": "Use gafas de sol, sombrero y protector solar SPF 30+. Busque sombra 11:00-15:00.",
            "Alto": "Reduzca exposición 10:00-16:00. SPF 30+, sombrero, gafas. Hidratación constante.",
            "Muy Alto": "ALERTA: Evite exposición 10:00-16:00. EPP obligatorio. Pausas cada 45 min.",
            "Extremo": "ALERTA MÁXIMA: Suspender trabajo exterior 10:00-16:00. Protección total obligatoria.",
        };

        const WEATHER_CODES = {
            0: "Despejado",
            1: "Mayormente despejado",
            2: "Parcialmente nublado",
            3: "Nublado",
            45: "Niebla",
            48: "Niebla con escarcha",
            51: "Llovizna ligera",
            53: "Llovizna moderada",
            55: "Llovizna intensa",
            61: "Lluvia ligera",
            63: "Lluvia moderada",
            65: "Lluvia intensa",
            71: "Nevada ligera",
            73: "Nevada moderada",
            75: "Nevada intensa",
            80: "Chubascos ligeros",
            81: "Chubascos moderados",
            82: "Chubascos fuertes",
            95: "Tormenta eléctrica",
            96: "Tormenta con granizo",
            99: "Tormenta con granizo fuerte",
        };

        const WEATHER_ICONS = {
            0: '☀️',
            1: '🌤️',
            2: '⛅',
            3: '☁️',
            45: '🌫️',
            48: '🌫️',
            51: '🌦️',
            53: '🌦️',
            55: '🌧️',
            61: '🌧️',
            63: '🌧️',
            65: '⛈️',
            71: '❄️',
            73: '❄️',
            75: '❄️',
            80: '🌧️',
            81: '⛈️',
            82: '⛈️',
            95: '⚡',
            96: '⛈️',
            99: '⛈️',
        };

        function App() {
            const [online, setOnline] = useState(navigator.onLine);
            const [usingLocalApi, setUsingLocalApi] = useState(false);
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);
            const [autoDetect, setAutoDetect] = useState(true);

            const checkConnection = useCallback(() => {
                setOnline(navigator.onLine);
                if (autoDetect && navigator.onLine) {
                    tryLocalApi();
                }
            }, [autoDetect]);

            const tryLocalApi = async () => {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);

                    const response = await fetch('http://localhost:8000/api/health', {
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        setUsingLocalApi(true);
                        return true;
                    }
                } catch (e) {
                    setUsingLocalApi(false);
                }
                return false;
            };

            const fetchData = useCallback(async () => {
                if (!online && !usingLocalApi) {
                    setError('Sin conexión a internet. Verifique su conexión.');
                    return;
                }

                setLoading(true);
                setError(null);

                try {
                    let results = {};

                    if (usingLocalApi) {
                        // Usar API local
                        const controller = new AbortController();
                        const timeoutId = setTimeout(() => controller.abort(), 15000);

                        const response = await fetch('http://localhost:8000/api/datos', {
                            signal: controller.signal
                        });
                        clearTimeout(timeoutId);

                        if (response.ok) {
                            const json = await response.json();
                            results = json.data || {};
                        } else {
                            throw new Error('Error en API local');
                        }
                    } else {
                        // Usar Open-Meteo directamente desde el navegador
                        const fetchPromises = Object.entries(CIUDADES).map(async ([ciudad, coords]) => {
                            try {
                                const params = new URLSearchParams({
                                    latitude: coords.lat,
                                    longitude: coords.lon,
                                    daily: 'uv_index_max,temperature_2m_max,weather_code,precipitation_probability_max',
                                    timezone: 'America/Santiago',
                                    forecast_days: 1
                                });

                                const response = await fetch(
                                    `https://api.open-meteo.com/v1/forecast?${params}`
                                );

                                if (!response.ok) throw new Error('Error en API');

                                const jsonData = await response.json();
                                const daily = jsonData.daily;

                                results[ciudad] = {
                                    ciudad: ciudad,
                                    uv: daily.uv_index_max[0] || 0,
                                    temperatura: daily.temperature_2m_max[0] || 0,
                                    clima: daily.weather_code[0] || 0,
                                    precipitacion: daily.precipitation_probability_max[0] || 0,
                                    humedad: null,
                                    fuente: 'Open-Meteo'
                                };
                            } catch (err) {
                                results[ciudad] = {
                                    ciudad: ciudad,
                                    uv: 0,
                                    temperatura: 0,
                                    clima: 0,
                                    precipitacion: 0,
                                    humedad: null,
                                    fuente: 'Sin datos',
                                    error: true
                                };
                            }
                        });

                        await Promise.all(fetchPromises);
                    }

                    setData(results);
                    setLastUpdate(new Date());
                } catch (err) {
                    setError('Error al obtener datos. Intente nuevamente.');
                } finally {
                    setLoading(false);
                }
            }, [online, usingLocalApi]);

            useEffect(() => {
                window.addEventListener('online', checkConnection);
                window.addEventListener('offline', checkConnection);

                // Auto-detectar API local al iniciar
                if (autoDetect) {
                    tryLocalApi();
                }

                return () => {
                    window.removeEventListener('online', checkConnection);
                    window.removeEventListener('offline', checkConnection);
                };
            }, [autoDetect]);

            useEffect(() => {
                if (!loading && !data) {
                    fetchData();
                }
            }, []);

            const getUVCategoria = (uv) => {
                return CATEGORIAS_UV.find(cat => uv >= cat.min && uv <= cat.max) || CATEGORIAS_UV[0];
            };

            const getWeatherIcon = (code) => {
                return WEATHER_ICONS[code] || '🌡️';
            };

            const getWeatherText = (code) => {
                return WEATHER_CODES[code] || 'Variable';
            };

            const hasAlert = (ciudad) => {
                if (!data || !data[ciudad]) return false;
                return data[ciudad].precipitacion >= 70;
            };

            const toggleMode = () => {
                setUsingLocalApi(!usingLocalApi);
                setData(null);
                setTimeout(fetchData, 100);
            };

            return (
                <div className="container">
                    <header>
                        <h1>🌞 Agente UV - Chile</h1>
                        <p>Monitoreo de radiación UV y condiciones climáticas</p>

                        <div className="status-bar">
                            <div className={`status-item ${online ? 'status-online' : 'status-offline'}`}>
                                <span className={`indicator ${online ? 'online' : 'offline'}`}></span>
                                {online ? 'Internet' : 'Sin conexión'}
                            </div>

                            {usingLocalApi && (
                                <div className="status-item status-local">
                                    <span className="indicator local"></span>
                                    API Local (MeteoChile)
                                </div>
                            )}

                            {lastUpdate && (
                                <div className="status-item status-loading">
                                    {lastUpdate.toLocaleTimeString('es-CL')}
                                </div>
                            )}
                        </div>

                        <div className="mode-selector">
                            <button
                                className={`mode-btn ${autoDetect ? 'active' : ''}`}
                                onClick={() => { setAutoDetect(true); tryLocalApi(); }}
                            >
                                🔍 Auto-detectar
                            </button>
                            <button
                                className={`mode-btn ${usingLocalApi && !autoDetect ? 'active' : ''}`}
                                onClick={() => { setAutoDetect(false); setUsingLocalApi(true); setData(null); setTimeout(fetchData, 100); }}
                            >
                                🖥️ API Local
                            </button>
                            <button
                                className={`mode-btn ${!usingLocalApi && !autoDetect ? 'active' : ''}`}
                                onClick={() => { setAutoDetect(false); setUsingLocalApi(false); setData(null); setTimeout(fetchData, 100); }}
                            >
                                🌐 Directo (Open-Meteo)
                            </button>
                        </div>

                        <button
                            className="refresh-btn"
                            onClick={fetchData}
                            disabled={loading || (!online && !usingLocalApi)}
                            style={{ marginTop: '20px' }}
                        >
                            {loading ? '⏳ Cargando...' : '🔄 Actualizar datos'}
                        </button>
                    </header>

                    {error && (
                        <div className="error-message">
                            <h3>⚠️ {error}</h3>
                            {!online && !usingLocalApi && <p>Conéctese a internet o inicie la API local</p>}
                        </div>
                    )}

                    {loading && !data && (
                        <div className="loading-container">
                            <div className="spinner"></div>
                            <p>Obteniendo datos climáticos...</p>
                        </div>
                    )}

                    {data && (
                        <div className="cities-grid">
                            {Object.entries(CIUDADES).map(([ciudad, coords]) => {
                                const cityData = data[ciudad] || {};
                                const uvCat = getUVCategoria(cityData.uv || 0);

                                return (
                                    <div key={ciudad} className="city-card">
                                        <div className="city-header">
                                            <span className="city-name">{ciudad}</span>
                                            <span className="city-source">{cityData.fuente || '---'}</span>
                                        </div>

                                        <div className={`uv-section ${uvCat.class}`}>
                                            <div className="uv-value">{cityData.uv?.toFixed(1) || '0.0'}</div>
                                            <div className="uv-label">{uvCat.nivel}</div>
                                        </div>

                                        <div className="weather-info">
                                            <div className="weather-item">
                                                <div className="weather-value">
                                                    {getWeatherIcon(cityData.clima)} {cityData.temperatura?.toFixed(0) || '0'}°C
                                                </div>
                                                <div className="weather-label">Temperatura</div>
                                            </div>
                                            <div className="weather-item">
                                                <div className="weather-value">{cityData.precipitacion || 0}%</div>
                                                <div className="weather-label">Prob. Lluvia</div>
                                            </div>
                                        </div>

                                        {cityData.clima !== undefined && (
                                            <div style={{ textAlign: 'center', marginTop: '10px', fontSize: '0.85rem', opacity: 0.8 }}>
                                                {getWeatherText(cityData.clima)}
                                            </div>
                                        )}

                                        {cityData.humedad !== null && cityData.humedad !== undefined && (
                                            <div style={{ textAlign: 'center', marginTop: '8px', fontSize: '0.85rem', opacity: 0.8 }}>
                                                💧 Humedad: {cityData.humedad}%
                                            </div>
                                        )}

                                        {hasAlert(ciudad) && (
                                            <div className="alert-badge">
                                                ⚠️ ALERTA PRECIPITACIÓN
                                            </div>
                                        )}

                                        <div className="recommendations">
                                            <div className="recommendations-title">📋 Recomendación</div>
                                            {RECOMENDACIONES[uvCat.nivel]}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    <footer>
                        <p>
                            Fuente: {usingLocalApi ? 'MeteoChile DMC (vía API local)' : 'Open-Meteo API'}
                            {' | '}
                            Datos en tiempo real
                        </p>
                        <p>Última actualización: {lastUpdate ? lastUpdate.toLocaleString('es-CL') : 'N/A'}</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
